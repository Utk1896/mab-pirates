# render.yaml — MAB Pirates deployment blueprint
# Connect this repo at https://dashboard.render.com/blueprints

services:
  - type: web
    name: mab-pirates
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: singapore  # closest free region to India
    plan: free
    envVars:
      - key: MENTOR_PASSWORD
        value: pirates2025   # change this!
    disk:
      name: pirates-data
      mountPath: /app
      sizeGB: 1
