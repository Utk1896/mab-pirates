<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>⚓ MAB Pirates — Mentor's Quarterdeck</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root {
  --navy:    #0a0e1a;
  --deep:    #0d1426;
  --plank:   #1a1206;
  --gold:    #d4a017;
  --gold2:   #f0c040;
  --copper:  #b87333;
  --rust:    #8b3a1a;
  --fog:     #c8b89a;
  --parchment: #f2e8c9;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--navy);
  color: var(--fog);
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 17px;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: linear-gradient(180deg, #0a0e1a 0%, #0d1a2e 40%, #0a1520 100%);
  pointer-events: none; z-index: 0;
}
.wrapper { position: relative; z-index: 1; }
.site-header {
  text-align: center;
  padding: 40px 24px 24px;
  border-bottom: 1px solid rgba(212,160,23,0.2);
  margin-bottom: 32px;
}
.site-title {
  font-family: 'Pirata One', cursive;
  font-size: 2.5rem;
  color: var(--gold2);
  text-shadow: 3px 3px 0 var(--rust);
}
.site-subtitle { color: var(--copper); font-style: italic; margin-top: 6px; }
main { max-width: 1100px; margin: 0 auto; padding: 0 20px 80px; }
.card {
  background: rgba(13,20,38,0.8);
  border: 1px solid rgba(212,160,23,0.25);
  border-radius: 4px;
  padding: 28px;
  margin-bottom: 24px;
  position: relative;
}
.card::before {
  content: '';
  position: absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.card-title {
  font-family: 'Pirata One', cursive;
  font-size: 1.5rem;
  color: var(--gold2);
  margin-bottom: 16px;
}
.form-input {
  background: rgba(10,14,26,0.8);
  border: 1px solid rgba(212,160,23,0.3);
  color: var(--fog);
  padding: 10px 14px;
  font-family: 'Crimson Pro', serif;
  font-size: 1rem;
  border-radius: 2px;
  outline: none;
  transition: border-color 0.2s;
  width: 100%;
}
.form-input:focus { border-color: var(--gold); }
.btn {
  font-family: 'Pirata One', cursive;
  font-size: 1rem;
  letter-spacing: 1px;
  padding: 11px 28px;
  background: linear-gradient(135deg, var(--gold) 0%, var(--copper) 100%);
  color: var(--navy);
  border: none;
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.2s;
}
.btn:hover { opacity: 0.9; transform: translateY(-1px); }
.btn-sm {
  font-family: 'Pirata One', cursive;
  font-size: 0.82rem;
  padding: 6px 14px;
  background: rgba(212,160,23,0.1);
  border: 1px solid rgba(212,160,23,0.4);
  color: var(--gold);
  cursor: pointer;
  border-radius: 2px;
  transition: all 0.15s;
}
.btn-sm:hover { background: var(--gold); color: var(--navy); }
table { width: 100%; border-collapse: collapse; }
th {
  font-family: 'Pirata One', cursive;
  color: var(--gold);
  border-bottom: 1px solid rgba(212,160,23,0.3);
  padding: 10px 12px;
  text-align: left;
  font-weight: normal;
  font-size: 0.9rem;
}
td { padding: 12px 12px; border-bottom: 1px solid rgba(212,160,23,0.07); color: var(--fog); font-size: 0.92rem; }
tr:hover td { background: rgba(212,160,23,0.05); }
.badge {
  display: inline-block; padding: 2px 10px; border-radius: 2px;
  font-size: 0.78rem; font-family: 'IM Fell English', serif;
}
.badge-success { background: rgba(42,122,58,0.3); border: 1px solid rgba(42,122,58,0.5); color: #6fbe7f; }
.badge-error   { background: rgba(122,26,26,0.3); border: 1px solid rgba(122,26,26,0.5); color: #e08080; }
.badge-pending { background: rgba(42,80,140,0.3); border: 1px solid rgba(42,80,140,0.5); color: #80a8e0; }
.modal-bg {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.75); z-index: 1000;
  backdrop-filter: blur(4px);
  align-items: flex-start; justify-content: center; padding: 40px 20px;
}
.modal-bg.open { display: flex; }
.modal {
  background: var(--deep);
  border: 1px solid rgba(212,160,23,0.4);
  border-radius: 6px;
  padding: 32px;
  max-width: 800px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  position: relative;
}
.modal-close {
  position: absolute; top:14px; right:18px;
  background: none; border: none;
  color: var(--copper); font-size: 1.4rem;
  cursor: pointer; font-family: 'Pirata One', cursive;
}
.modal-close:hover { color: var(--gold); }
pre {
  background: rgba(10,14,26,0.9);
  border: 1px solid rgba(212,160,23,0.2);
  border-radius: 4px;
  padding: 20px;
  font-size: 0.82rem;
  color: #b0d0b0;
  white-space: pre;
  overflow-x: auto;
  line-height: 1.6;
  max-height: 60vh;
  overflow-y: auto;
  font-family: 'Courier New', monospace;
}
.login-wrap { max-width: 400px; margin: 80px auto; }
.empty-state { text-align:center; padding:60px 20px; color:var(--copper); font-style:italic; }
#toast {
  position: fixed; bottom: 30px; right: 30px;
  background: rgba(26,18,6,0.95); border: 1px solid var(--gold);
  color: var(--fog); padding: 14px 22px; border-radius: 4px;
  font-family: 'IM Fell English', serif; font-style: italic;
  transform: translateX(200px); opacity: 0; transition: all 0.3s; z-index:9999;
}
#toast.show { transform: translateX(0); opacity: 1; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--navy); }
::-webkit-scrollbar-thumb { background: rgba(212,160,23,0.3); border-radius: 3px; }
.search-row { display:flex; gap:10px; margin-bottom:16px; }
.search-row input { flex:1; }
</style>
</head>
<body>
<div class="wrapper">
<header class="site-header">
  <div class="site-title">⚓ Mentor's Quarterdeck</div>
  <div class="site-subtitle">— Captain's Eyes Only —</div>
</header>

<main>

<!-- Login -->
<div id="login-section">
  <div class="login-wrap">
    <div class="card">
      <div class="card-title">🔐 Access the Quarterdeck</div>
      <p style="color:var(--copper);font-style:italic;margin-bottom:20px;">
        Enter the mentor's passphrase to board this vessel.
      </p>
      <input class="form-input" type="password" id="pw-input" placeholder="Passphrase..."
             onkeydown="if(event.key==='Enter')login()" style="margin-bottom:14px"/>
      <br><br>
      <button class="btn" onclick="login()" style="width:100%">⚓ Come Aboard</button>
      <div id="login-err" style="color:#e08080;font-style:italic;margin-top:10px;display:none"></div>
    </div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" style="display:none">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <div>
      <span style="font-family:'Pirata One',cursive;color:var(--gold2);font-size:1.3rem">All Submissions</span>
      <span id="count-badge" style="color:var(--copper);font-style:italic;font-size:0.9rem;margin-left:10px"></span>
    </div>
    <button class="btn-sm" onclick="refresh()">⟳ Refresh</button>
  </div>

  <div class="search-row">
    <input class="form-input" id="search-input" placeholder="Search by name or ID..." oninput="renderTable()" style="max-width:360px"/>
  </div>

  <div class="card" style="padding:0;overflow:hidden">
    <table>
      <thead><tr>
        <th>Captain</th>
        <th>Crew ID</th>
        <th>File</th>
        <th>Uploaded</th>
        <th>Best Gold</th>
        <th>Regret</th>
        <th>Status</th>
        <th></th>
      </tr></thead>
      <tbody id="uploads-tbody"></tbody>
    </table>
    <div id="table-empty" class="empty-state" style="display:none">
      <span style="font-size:2rem;display:block;margin-bottom:10px">🌊</span>
      No submissions yet.
    </div>
  </div>
</div>

</main>
</div>

<!-- Code Modal -->
<div class="modal-bg" id="code-modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '';
let token = null;
let allUploads = [];

async function login() {
  const pw = document.getElementById('pw-input').value;
  const errEl = document.getElementById('login-err');
  errEl.style.display = 'none';

  const fd = new FormData();
  fd.append('password', pw);
  const res = await fetch(`${API}/api/mentor/login`, { method:'POST', body:fd });
  const data = await res.json();
  if (!res.ok) {
    errEl.textContent = data.detail || 'Wrong passphrase!';
    errEl.style.display = 'block';
    return;
  }
  token = data.token;
  document.getElementById('login-section').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  loadUploads();
}

async function loadUploads() {
  const res = await fetch(`${API}/api/mentor/uploads?token=${token}`);
  if (!res.ok) { toast('Session expired — reload and login again.'); return; }
  allUploads = await res.json();
  document.getElementById('count-badge').textContent = `(${allUploads.length} submissions)`;
  renderTable();
}

function renderTable() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const filtered = allUploads.filter(u =>
    !q || u.student_name?.toLowerCase().includes(q) || u.student_id?.toLowerCase().includes(q)
  );

  const tbody = document.getElementById('uploads-tbody');
  const emptyEl = document.getElementById('table-empty');

  if (!filtered.length) {
    tbody.innerHTML = '';
    emptyEl.style.display = 'block';
    return;
  }
  emptyEl.style.display = 'none';

  tbody.innerHTML = filtered.map(u => `
    <tr>
      <td><strong style="color:var(--fog)">${esc(u.student_name)}</strong></td>
      <td style="color:var(--copper)">${esc(u.student_id)}</td>
      <td style="font-size:0.82rem;color:rgba(200,184,154,0.6)">${esc(u.filename)}</td>
      <td style="font-size:0.82rem;color:rgba(200,184,154,0.5)">${fmtDate(u.uploaded_at)}</td>
      <td><span style="font-family:'Pirata One',cursive;color:var(--gold2)">${u.total_gold != null ? u.total_gold.toLocaleString() : '—'}</span></td>
      <td style="color:var(--copper)">${u.regret != null ? u.regret.toLocaleString() : '—'}</td>
      <td><span class="${badgeClass(u.status)}">${u.status || 'pending'}</span></td>
      <td><button class="btn-sm" onclick="viewCode('${u.id}')">📜 View</button></td>
    </tr>`).join('');
}

async function viewCode(uploadId) {
  document.getElementById('code-modal').classList.add('open');
  document.getElementById('modal-body').innerHTML =
    `<div style="color:var(--copper);font-style:italic"><span style="display:inline-block;width:18px;height:18px;border:2px solid rgba(212,160,23,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;vertical-align:middle;margin-right:8px"></span> Loading code...</div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;

  const res = await fetch(`${API}/api/mentor/code/${uploadId}?token=${token}`);
  const data = await res.json();
  const u = data.upload;
  document.getElementById('modal-body').innerHTML = `
    <div style="font-family:'Pirata One',cursive;color:var(--gold2);font-size:1.3rem;margin-bottom:4px">
      📜 ${esc(u.student_name)} — ${esc(u.filename)}
    </div>
    <div style="color:var(--copper);font-style:italic;font-size:0.85rem;margin-bottom:16px">
      Submitted ${fmtDate(u.uploaded_at)} · ID: ${esc(u.student_id)}
    </div>
    <pre>${esc(data.code)}</pre>`;
}

function closeModal() {
  document.getElementById('code-modal').classList.remove('open');
}
function refresh() { loadUploads(); toast('Refreshed the log!'); }
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function badgeClass(s) {
  if (s === 'success') return 'badge badge-success';
  if (s === 'error' || s === 'timeout') return 'badge badge-error';
  return 'badge badge-pending';
}
</script>
</body>
</html>
